# Local data plane for AgentRank (Week 1). Dev-only credentials — do not use in production.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentrank
      POSTGRES_PASSWORD: agentrank
      POSTGRES_DB: agentrank
    ports:
      # Host 5433 avoids clashing with a local Postgres on 5432 (common on dev machines).
      - "5433:5432"
    volumes:
      - agentrank_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentrank -d agentrank"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - agentrank_qdrant_data:/qdrant/storage

  searchd:
    build:
      context: ../..
      dockerfile: apps/agentrank/Dockerfile
    environment:
      DATABASE_URL: postgresql://agentrank:agentrank@postgres:5432/agentrank
      REDIS_URL: redis://redis:6379
      SEARCH_INDEX_PATH: /data/index
      QDRANT_URL: http://qdrant:6334
      AGENTRANK_EMBEDDER: hash
      AGENTRANK_PUBLIC_URL: http://localhost:8090
      PORT: "8090"
    ports:
      - "8090:8090"
    volumes:
      - ../agentrank/.local-search-index:/data/index
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  agentrank_pg_data:
  agentrank_qdrant_data:
