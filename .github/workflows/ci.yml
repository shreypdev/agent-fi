name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-data-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agentrank
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentrank
          POSTGRES_PASSWORD: agentrank
          POSTGRES_DB: agentrank
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentrank -d agentrank"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
          - 6334:6334
    env:
      DATABASE_URL: postgresql://agentrank:agentrank@localhost:5432/agentrank
      REDIS_URL: redis://localhost:6379
      # gRPC for agentrank-vector (REST on 6333 for readiness only)
      QDRANT_URL: http://127.0.0.1:6334
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Qdrant (REST /collections)
        run: |
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:6333/collections" >/dev/null 2>&1; then
              echo "qdrant is up"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Qdrant did not become ready in time"
          exit 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/agentrank -> target"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: searchd has no outbound HTTP client (crawl stays in agentbot)
        run: |
          if grep -Rq 'reqwest\|ureq' crates/searchd/src 2>/dev/null; then
            echo "::error::searchd must not add reqwest/ureq; user URL fetches belong in agentbot only"
            exit 1
          fi

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build healthd
        run: cargo build -p agentrank-healthd

      - name: cargo build agentbot
        run: cargo build -p agentrank-agentbot

      - name: cargo build search stack
        run: |
          cargo build -p agentrank-searchd
          cargo build -p agentrank-search-index --bin agentrank-index

      - name: cargo build consoled
        run: cargo build -p agentrank-consoled

      - name: Install sqlx-cli
        uses: baptiste0928/cargo-install@v3
        with:
          crate: sqlx-cli
          version: "0.8.2"
          args: --no-default-features --features rustls,postgres

      - name: sqlx migrate
        run: sqlx migrate run --source migrations

      - name: Run healthd
        run: cargo run -p agentrank-healthd --bin healthd

      - name: Rebuild search index and smoke searchd
        run: |
          set -e
          export SEARCH_INDEX_PATH="${{ runner.temp }}/search_index"
          cargo run -p agentrank-search-index --bin agentrank-index -- rebuild --output "$SEARCH_INDEX_PATH"
          ./target/debug/searchd &
          SPID=$!
          cleanup() {
            kill "$SPID" 2>/dev/null || true
            wait "$SPID" 2>/dev/null || true
          }
          trap cleanup EXIT
          ok=0
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8080/ready" >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 1
          done
          if [ "$ok" != 1 ]; then
            echo "searchd failed to become ready on :8080"
            exit 1
          fi
          curl -sf -X POST "http://127.0.0.1:8080/v1/search" \
            -H "content-type: application/json" \
            -d '{"query":"demo","limit":5}' | jq -e '.results | type == "array"' >/dev/null

  python-ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: Pytest
        run: uv run pytest

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo lint, build, typecheck
        run: pnpm exec turbo run lint build typecheck

      - name: Landing unit tests
        run: pnpm --filter @agentfi/landing test

      - name: Console unit tests
        run: pnpm --filter @agentfi/console test

  docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build AgentRank image (searchd / consoled / agentbot)
        run: docker build -f apps/agentrank/Dockerfile -t agentrank:ci .

      - name: Build console UI image
        run: |
          docker build -f apps/console/Dockerfile \
            --build-arg VITE_CONSOLE_API_BASE=https://consoled.example.com \
            -t agentrank-console:ci .

      - name: Build landing image
        run: |
          docker build -f apps/landing/Dockerfile \
            --build-arg VITE_SEARCH_API_BASE_URL=https://example.com \
            --build-arg VITE_PUBLIC_AGENT_URL=https://example.com \
            -t pronox-landing:ci .
