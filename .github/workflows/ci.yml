name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-data-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agentrank
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentrank
          POSTGRES_PASSWORD: agentrank
          POSTGRES_DB: agentrank
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentrank -d agentrank"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://agentrank:agentrank@localhost:5432/agentrank
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/agentrank -> target"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build healthd
        run: cargo build -p agentrank-healthd

      - name: Install sqlx-cli
        uses: baptiste0928/cargo-install@v3
        with:
          crate: sqlx-cli
          version: "0.8.2"
          args: --no-default-features --features rustls,postgres

      - name: sqlx migrate
        run: sqlx migrate run --source migrations

      - name: Run healthd
        run: cargo run -p agentrank-healthd --bin healthd

  python-ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format
        run: uv run ruff format --check src tests

      - name: Pytest
        run: uv run pytest

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Turbo lint, build, typecheck
        run: pnpm exec turbo run lint build typecheck
